  <!-- Match the app's theme detection exactly -->

  <style>
    /* ── Light theme (warm cream — matches globals.css :root) ── */
    :root {
      --bg:       oklch(0.96  0.005 75);
      --fg:       oklch(0.22  0.006 56);
      --muted-fg: oklch(0.50  0.013 58);
      --border:   oklch(0.87  0.008 60);
      --muted:    oklch(0.92  0.005 60);
    }
    /* ── Dark theme (matches globals.css .dark) ── */
    .dark {
      --bg:       oklch(0.08  0.015 260);
      --fg:       oklch(0.93  0.005 260);
      --muted-fg: oklch(0.55  0.01  260);
      --border:   oklch(0.2   0.02  260);
      --muted:    oklch(0.15  0.015 260);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100%;
    }

    /* ── Entry animation ── */
    @keyframes entry { to { opacity: 1; transform: translateY(0); } }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      max-width: 384px;
      width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      animation: entry 0.45s ease-out forwards;
    }

    /* ── Illustration ── */
    .illus {
      width: 288px;
      height: 224px;
      overflow: visible;
      color: var(--fg);
      opacity: 0.75;
    }

    /* Float / pulse animations for SVG groups */
    @keyframes fly { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes nod { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes spill-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

    .fp1 { animation: fly  3.4s 0.0s ease-in-out infinite; }
    .fp2 { animation: fly  3.9s 0.7s ease-in-out infinite; }
    .fp3 { animation: fly  4.2s 1.4s ease-in-out infinite; }
    .fch { animation: fly  4.6s 1.9s ease-in-out infinite; }
    .fru { animation: bob  5.2s 0.4s ease-in-out infinite; }
    .fmu { animation: nod  6.5s 1.1s ease-in-out infinite; }
    .fsp { animation: spill-pulse 4.0s ease-in-out infinite; transform-box: fill-box; transform-origin: 18px 20px; }

    /* ── Copy block ── */
    @keyframes msg-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .copy { animation: msg-in 0.3s ease-out; }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.4;
    }
    p {
      margin-top: 10px;
      font-size: 0.875rem;
      color: var(--muted-fg);
      line-height: 1.6;
    }
    code {
      font-size: 0.75rem;
      background: var(--muted);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    }

    /* ── Status line ── */
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted-fg);
    }
    .status svg { flex-shrink: 0; }

    /* ── Retry button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--fg);
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: color-mix(in oklch, var(--fg) 6%, transparent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
  </style>

  <script>
    var MESSAGES = [
      { h: "Looks like our calculators ran out of coffee",    s: "The analytics engine is taking an unscheduled break. Back before you can say" },
      { h: "Seems the SQL server needed a bathroom break",     s: "Even databases need a moment. Hang tight while we flush the connection pool and try again \u2014" },
      { h: "Our data pipeline got tangled up",                s: "Someone left a semicolon in the wrong place. We\u2019re untangling the query queue as we speak \u2014" },
      { h: "The spreadsheets have gone on strike",            s: "Negotiations are underway. Expect a resolution before the next GROUP BY clause. Meanwhile \u2014" },
      { h: "Error 503: Insufficient caffeine in server room", s: "Engineering has been dispatched with an emergency espresso. Normal service resumes shortly \u2014" },
      { h: "Our servers are doing unauthorised yoga",         s: "The downward-dog pose is wreaking havoc on uptime. We\u2019re stretching toward a fix \u2014" },
      { h: "The dashboard flew to the wrong endpoint",        s: "We\u2019ve issued an APB for the missing analytics. Last seen near port 8000, heading north \u2014" },
      { h: "Our data gnomes clocked out early",               s: "They left a note: back after a GROUP BY and a cup of tea. We\u2019ll have them sorted \u2014" },
      { h: "Someone tripped over the ethernet cable again",   s: "A classic. The culprit has been identified. Data flow should resume any second now \u2014" },
      { h: "The analytics engine phoned in sick",             s: "We\u2019ve sent the backup hamster to power the wheel. ETA: very soon \u2014" },
    ];

    var retryCount  = 0;
    var lastChecked = 0;
    var timerInterval = null;
    var pollTimeout   = null;
    var alive = true;

    function $$(id) { return document.getElementById(id); }

    function setChecking(on) {
      $$('retry-btn').disabled = on;
      $$('retry-text').textContent = on ? 'Checking\u2026' : 'Try now';
      if (on) $$('retry-icon').classList.add('spin');
      else    $$('retry-icon').classList.remove('spin');
    }

    function startTimer() {
      clearInterval(timerInterval);
      lastChecked = Date.now();
      timerInterval = setInterval(function () {
        var s   = Math.floor((Date.now() - lastChecked) / 1000);
        var ago = s < 3 ? 'Just checked' : 'Last checked ' + s + 's ago';
        $$('status-text').textContent = ago + ' \u00b7 auto-retrying every 10s';
      }, 1000);
    }

    function updateCopy() {
      var m    = MESSAGES[retryCount % MESSAGES.length];
      var copy = $$('copy');
      // retrigger animation
      copy.style.animation = 'none';
      void copy.offsetWidth;
      copy.style.animation = '';
      $$('headline').textContent = m.h;
      $$('subtext').textContent  = m.s;
    }

    async function check() {
      if (!alive) return;
      clearTimeout(pollTimeout);
      setChecking(true);
      $$('status-text').textContent = 'Checking server\u2026';
      clearInterval(timerInterval);

      var ok = false;
      try {
        var res = await fetch('/api/health', {
          signal: AbortSignal.timeout(3000),
          cache:  'no-store',
        });
        ok = res.ok;
      } catch (_) { /* still down */ }

      if (!alive) return;

      if (ok) {
        $$('status-text').textContent = 'Back online! Redirecting\u2026';
        var returnTo = '';
        try { returnTo = sessionStorage.getItem('503-return') || ''; } catch (_) {}
        try { sessionStorage.removeItem('503-return'); } catch (_) {}
        window.location.replace(returnTo || '/');
        return;
      }

      setChecking(false);
      startTimer();
      pollTimeout = setTimeout(check, 10000);
    }

    function retry() {
      retryCount++;
      updateCopy();
      check();
    }

    window.addEventListener('pagehide', function () {
      alive = false;
      clearTimeout(pollTimeout);
      clearInterval(timerInterval);
    });

    // kick off
    check();
  </script>
